<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ReelForge Login Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e21d48",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211115",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 antialiased">
<div class="w-full max-w-md bg-white dark:bg-[#2a161b] rounded-xl shadow-lg dark:shadow-none border border-slate-100 dark:border-[#3a1f25] p-8">
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-6">
<div class="w-8 h-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path></svg>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">ReelForge</h1>
</div>
<h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight text-center">Welcome back</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-center text-sm">Sign in to your account to continue</p>
</div>
<!-- Form -->
<form class="space-y-5">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="email">Email address</label>
<input class="w-full rounded-lg border-slate-200 dark:border-[#4a2a32] bg-white dark:bg-[#1a0d10] text-slate-900 dark:text-slate-100 px-4 py-2.5 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div>
<div class="flex items-center justify-between mb-1">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full rounded-lg border-slate-200 dark:border-[#4a2a32] bg-white dark:bg-[#1a0d10] text-slate-900 dark:text-slate-100 px-4 py-2.5 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-medium rounded-lg px-4 py-2.5 transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-background-dark" type="submit">
                Sign In
            </button>
</form>
<div class="mt-6">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-[#3a1f25]"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-white dark:bg-[#2a161b] text-slate-500 dark:text-slate-400">Or continue with</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="flex items-center justify-center w-full px-4 py-2 border border-slate-200 dark:border-[#3a1f25] rounded-lg bg-white dark:bg-[#1a0d10] text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-[#221216] transition-colors font-medium text-sm" type="button">
<svg class="h-5 w-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center w-full px-4 py-2 border border-slate-200 dark:border-[#3a1f25] rounded-lg bg-white dark:bg-[#1a0d10] text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-[#221216] transition-colors font-medium text-sm" type="button">
<svg class="h-5 w-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
                    GitHub
                </button>
</div>
</div>
<p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
            Don't have an account? 
            <a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">Sign up</a>
</p>
</div>
</body></html>
